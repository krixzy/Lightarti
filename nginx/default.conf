proxy_cache_path /var/cache/nginx/lightarti
  levels=1:2
  keys_zone=lightarti_cache:10m
  max_size=500m
  inactive=60m
  use_temp_path=off;

server {
  listen 80;

  client_max_body_size 500M;

  location /assets/ {
    proxy_pass http://rails:3333;

    proxy_cache lightarti_cache;
    proxy_cache_valid 200 1d;

    add_header X-Cache-Status $upstream_cache_status always;

    proxy_set_header Host $http_host;
  }


  location / {
    proxy_pass http://rails:3333;

    proxy_cache lightarti_cache;
    proxy_cache_valid 200 10m;
    proxy_cache_methods GET HEAD;

    proxy_no_cache $http_cookie $http_authorization;
    proxy_cache_bypass $http_cookie $http_authorization;

    add_header X-Cache-Status $upstream_cache_status always;

    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}